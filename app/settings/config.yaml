server:
  name: probe
  environment: dev
  host: "0.0.0.0"
  port: 3000
  audit_log_path: ./audit.log

limits:
  max_lines: 50
  max_bytes: 65536
  max_time_range_hours: 24
  command_timeout_seconds: 10

security:
  redact_enabled: true

paths:
  hourly_log_dir: /data/brick/log
  supervisor_log_dir: /var/log/supervisor
  glog_path: /data/pinfire/tools/glog.sh
